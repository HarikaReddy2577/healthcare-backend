version: '3.9'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: healthcare_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: your-super-secret-django-key-change-this-in-production
      DEBUG: "True"
      DB_NAME: healthcare_db
      DB_USER: postgres
      DB_PASSWORD: yourpassword
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate &&
             gunicorn healthcare_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"

volumes:
  postgres_data:
